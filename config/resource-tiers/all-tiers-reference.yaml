# ============================================================
# GitLab Workspaces - 전체 리소스 티어 참조표
# GitLab 18.9 / 최대 5,000 동시 사용자 기준
# ============================================================
#
# 티어 결정 기준:
#   XS  : 동시 사용자  ~50명   (소규모 팀)
#   S   : 동시 사용자  ~100명  (중소 팀)
#   M   : 동시 사용자  ~250명  (중간 규모)
#   L   : 동시 사용자  ~500명  (대규모 팀)
#   XL  : 동시 사용자 ~1,000명 (엔터프라이즈 소)
#   2XL : 동시 사용자 ~2,500명 (엔터프라이즈 중)
#   3XL : 동시 사용자 ~5,000명 (엔터프라이즈 대)
#
# GitLab 18.9 공식 기준값:
#   Workspace 기본 req : CPU 500m  / Memory 512Mi
#   Workspace 기본 lim : CPU 1core / Memory 1Gi
#   Workspace 최대 lim : CPU 2core / Memory 4Gi  (max_resources_per_workspace)
#   Storage per WS     : 10 GiB (PVC)
#   nginx WebSocket    : ~50K concurrent / 1 replica (< 1GB / < 1 core)
# ============================================================

# ── 계산 공식 ─────────────────────────────────────────────
# WS 노드당 수용량 = min(사용가능CPU / 500m, 사용가능Mem / 512Mi)
# 필요 노드 수     = ceil(동시사용자 × 1.2 / 노드당 수용량)
# 에이전트 replica = ceil(동시사용자 / 1,000)  (최소 1)
# Proxy replica   = ceil(동시사용자 / 600)    (최소 1)
# Ingress replica = ceil(동시사용자 / 1,000)  (최소 2, 고가용성)
# ──────────────────────────────────────────────────────────

tiers:

  # ============================================================
  # Tier XS: 동시 사용자 50명
  # ============================================================
  xs:
    concurrent_users: 50
    total_users_max: 500        # 전체 등록 가능 사용자 (동시 10% 기준)
    tier_label: "XS"

    workspace:
      per_workspace:
        cpu_request: "500m"
        cpu_limit: "1000m"      # 기본 limit
        cpu_max: "2000m"        # 최대 허용 limit
        memory_request: "512Mi"
        memory_limit: "1Gi"     # 기본 limit
        memory_max: "4Gi"       # 최대 허용 limit
        storage: "10Gi"
      totals:
        cpu_request: "25 cores"
        cpu_limit_max: "100 cores"
        memory_request: "25 GiB"
        memory_limit_max: "200 GiB"
        storage: "500 GiB"
      quotas:
        workspaces_quota: 50
        workspaces_per_user_quota: 5

    gitlab_agent:
      replicas: 1
      per_replica:
        cpu_request: "200m"
        cpu_limit: "500m"
        memory_request: "256Mi"
        memory_limit: "512Mi"
      total:
        cpu_request: "200m"
        memory_request: "256Mi"
      hpa: false

    workspaces_proxy:
      replicas: 1
      per_replica:
        cpu_request: "200m"
        cpu_limit: "500m"
        memory_request: "256Mi"
        memory_limit: "512Mi"
      total:
        cpu_request: "200m"
        memory_request: "256Mi"
      hpa: false

    ingress_nginx:
      replicas: 2               # 최소 2 (고가용성)
      per_replica:
        cpu_request: "200m"
        cpu_limit: "1000m"
        memory_request: "256Mi"
        memory_limit: "512Mi"
      total:
        cpu_request: "400m"
        memory_request: "512Mi"
      hpa: false

    cert_manager:               # 정적 (전 티어 동일)
      total:
        cpu_request: "300m"
        memory_request: "320Mi"

    cluster:
      workspace_nodes:
        type: "8 vCPU / 32 GiB"
        count: 5                # ceil(50 × 1.2 / 14) = 5
        max_workspaces_per_node: 14  # CPU 병목: 7000m/500m
        autoscale_max: 10
        bottleneck: "CPU"
      infrastructure_nodes:
        type: "4 vCPU / 16 GiB"
        count: 2
      total_nodes: 7

    grand_total:
      cpu_request: "~26 cores"
      cpu_limit_max: "~103 cores"
      memory_request: "~26 GiB"
      memory_limit_max: "~201 GiB"
      storage: "500 GiB"

  # ============================================================
  # Tier S: 동시 사용자 100명
  # ============================================================
  s:
    concurrent_users: 100
    total_users_max: 1000
    tier_label: "S"

    workspace:
      per_workspace:
        cpu_request: "500m"
        cpu_limit: "1000m"
        cpu_max: "2000m"
        memory_request: "512Mi"
        memory_limit: "1Gi"
        memory_max: "4Gi"
        storage: "10Gi"
      totals:
        cpu_request: "50 cores"
        cpu_limit_max: "200 cores"
        memory_request: "50 GiB"
        memory_limit_max: "400 GiB"
        storage: "1 TiB"
      quotas:
        workspaces_quota: 100
        workspaces_per_user_quota: 5

    gitlab_agent:
      replicas: 1
      per_replica:
        cpu_request: "200m"
        cpu_limit: "500m"
        memory_request: "256Mi"
        memory_limit: "512Mi"
      total:
        cpu_request: "200m"
        memory_request: "256Mi"
      hpa: false

    workspaces_proxy:
      replicas: 1
      per_replica:
        cpu_request: "300m"
        cpu_limit: "500m"
        memory_request: "384Mi"
        memory_limit: "768Mi"
      total:
        cpu_request: "300m"
        memory_request: "384Mi"
      hpa: false

    ingress_nginx:
      replicas: 2
      per_replica:
        cpu_request: "200m"
        cpu_limit: "1000m"
        memory_request: "256Mi"
        memory_limit: "512Mi"
      total:
        cpu_request: "400m"
        memory_request: "512Mi"
      hpa: false

    cert_manager:
      total:
        cpu_request: "300m"
        memory_request: "320Mi"

    cluster:
      workspace_nodes:
        type: "8 vCPU / 32 GiB"
        count: 9                # ceil(100 × 1.2 / 14) = 9
        max_workspaces_per_node: 14
        autoscale_max: 18
        bottleneck: "CPU"
      infrastructure_nodes:
        type: "4 vCPU / 16 GiB"
        count: 2
      total_nodes: 11

    grand_total:
      cpu_request: "~51 cores"
      cpu_limit_max: "~202 cores"
      memory_request: "~51 GiB"
      memory_limit_max: "~401 GiB"
      storage: "1 TiB"

