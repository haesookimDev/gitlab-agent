        cpu_request: "500m"
        cpu_limit: "1500m"
        memory_request: "512Mi"
        memory_limit: "1Gi"
      total:
        cpu_request: "500m"
        memory_request: "512Mi"
      hpa: false

    workspaces_proxy:
