    cluster:
      workspace_nodes:
        type: "16 vCPU / 64 GiB"
        count: 11               # ceil(250 × 1.2 / 28) = 11
        max_workspaces_per_node: 28  # CPU 병목: 14000m/500m
        autoscale_max: 22
        bottleneck: "CPU"
      infrastructure_nodes:
