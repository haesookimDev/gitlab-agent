# ============================================================
# .devfile.yaml - GitLab Workspaces 개발 환경 정의
# GitLab 18.9 / devfile 2.2.0 기준
# ============================================================
# 이 파일을 GitLab 프로젝트 루트에 '.devfile.yaml' 로 저장하세요.
#
# 지원 컴포넌트: container, volume 만 지원
# 미지원: parent, projects, starterProjects
#
# 명명 규칙 (GitLab Workspaces 제약사항):
#   - 컴포넌트/커맨드 이름: gl-, gl_, GL-, GL_ 로 시작 불가
#   - postStart 이벤트 이름: 반드시 gl- 로 시작해야 함
#   - 변수 키: gl-, gl_, GL-, GL_ 로 시작 불가
# ============================================================
schemaVersion: 2.2.0

metadata:
  name: my-dev-workspace
  version: 1.0.0

# ----------------------------------------
# 컴포넌트 정의
# ----------------------------------------
components:

  # 메인 개발 컨테이너
  # GitLab이 기본 devfile 미사용 시 이 컨테이너에 VS Code가 자동 주입됨
  - name: dev
    container:
      # GitLab Universal Developer Image (권장)
      # Python, Node.js, Go, Java, PHP, GCC 포함
      image: registry.gitlab.com/gitlab-org/remote-development/gitlab-remote-development-docs/ubuntu:22.04

      # 리소스 설정
      memoryLimit: "2Gi"
      memoryRequest: "512Mi"
      cpuLimit: "2"
      cpuRequest: "500m"

      # 포트 포워딩 (Workspace에서 외부 접속 허용)
      endpoints:
        - name: app-3000
          targetPort: 3000
          exposure: public
          protocol: https
        - name: app-8080
          targetPort: 8080
          exposure: public
          protocol: https

      # 퍼시스턴트 볼륨 마운트
      volumeMounts:
        - name: workspace-data
          path: /workspace

      # 환경 변수 (gl_ 또는 gl- 로 시작 불가)
      env:
        - name: WORKSPACE_HOME
          value: /workspace
        - name: NODE_ENV
          value: development

  # 퍼시스턴트 스토리지 볼륨
  - name: workspace-data
    volume:
      size: "10Gi"
      # ephemeral: false → 재시작 후에도 데이터 유지 (기본값)
      # ephemeral: true  → 재시작 시 데이터 초기화
      ephemeral: false

# ----------------------------------------
# 커맨드 정의
# 이름은 gl- 로 시작 불가
# ----------------------------------------
commands:
  - id: install
    exec:
      label: "Install Dependencies"
      component: dev
      workingDir: /workspace
      commandLine: |
        if [ -f package.json ]; then npm install
        elif [ -f requirements.txt ]; then pip install -r requirements.txt
        elif [ -f go.mod ]; then go mod download
        else echo "No package manager config found"; fi

  - id: start
    exec:
      label: "Start Dev Server"
      component: dev
      workingDir: /workspace
      commandLine: |
        if [ -f package.json ]; then npm run dev
        elif [ -f manage.py ]; then python manage.py runserver 0.0.0.0:8000
        else echo "No start command configured"; fi
      group:
        kind: run
        isDefault: true

  - id: build
    exec:
      label: "Build"
      component: dev
      workingDir: /workspace
      commandLine: |
        if [ -f package.json ]; then npm run build
        elif [ -f Makefile ]; then make build
        else echo "No build command configured"; fi
      group:
        kind: build
        isDefault: true

  - id: test
    exec:
      label: "Run Tests"
      component: dev
      workingDir: /workspace
      commandLine: |
        if [ -f package.json ]; then npm test
        elif [ -f pytest.ini ] || [ -f setup.cfg ]; then pytest
        elif [ -f go.mod ]; then go test ./...
        else echo "No test command configured"; fi
      group:
        kind: test
        isDefault: true

# ----------------------------------------
# 이벤트
# postStart 이벤트 이름은 반드시 gl- 로 시작
# ----------------------------------------
events:
  postStart:
    - gl-install-deps   # 위 install 커맨드를 postStart로 자동 실행

# ※ preStart 이벤트는 지원되지 않습니다.
