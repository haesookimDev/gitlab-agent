# kind cluster for local GitLab + Web IDE extension-host testing.
# Maps host 80/443 -> ingress controller so *.localtest.me works from the browser.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitlab-webide
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
